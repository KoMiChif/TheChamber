<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Chamber</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff;
               font-family: -apple-system, system-ui, sans-serif; }
  #renderCanvas { width: 100vw; height: 100vh; display: block; outline: none; touch-action: none; }
  #status { position: fixed; left: 12px; top: 12px; padding: 8px 12px;
            background: rgba(0,0,0,0.6); border-radius: 6px; font-size: 14px;
            pointer-events: none; transition: opacity 0.5s; }
  #vrbtn { position: fixed; right: 12px; bottom: 12px; padding: 14px 24px;
           background: #3b82f6; color: #fff; border: 0; border-radius: 8px;
           font-size: 16px; cursor: pointer; }
  #vrbtn:disabled { background: #555; cursor: not-allowed; }

  /* Tune-mode UI (hidden by default) */
  #tune-panel {
    position: fixed; right: 12px; top: 12px; width: 280px;
    background: rgba(0,0,0,0.85); border-radius: 8px; padding: 16px;
    font-size: 13px; max-height: calc(100vh - 100px); overflow-y: auto;
  }
  #tune-panel.hidden { display: none; }
  #tune-panel h3 { margin: 0 0 12px; font-size: 14px; color: #8cf; }
  #tune-panel label { display: block; margin: 10px 0 4px; }
  #tune-panel .val { color: #8cf; font-family: monospace; float: right; }
  #tune-panel input[type=range] { width: 100%; }
  #tune-panel .actions { margin-top: 14px; display: flex; gap: 8px; }
  #tune-panel button { flex: 1; padding: 8px; background: #444; border: 0;
                       color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #tune-panel button:hover { background: #666; }
  #tune-panel pre { margin-top: 12px; padding: 8px; background: #000; border-radius: 4px;
                    font-size: 11px; white-space: pre-wrap; word-break: break-all;
                    color: #8f8; }
</style>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="status">Loading...</div>
<button id="vrbtn" disabled>Enter VR</button>

<div id="tune-panel" class="hidden">
  <h3>TUNE MODE</h3>
  <label>Position X <span class="val" id="px-v">0.00</span></label>
  <input type="range" id="px" min="-3" max="3" step="0.01">
  <label>Position Y <span class="val" id="py-v">0.00</span></label>
  <input type="range" id="py" min="-1" max="3" step="0.01">
  <label>Position Z <span class="val" id="pz-v">0.00</span></label>
  <input type="range" id="pz" min="-3" max="3" step="0.01">
  <label>Rotation X <span class="val" id="rx-v">0.00</span></label>
  <input type="range" id="rx" min="-3.14159" max="3.14159" step="0.01">
  <label>Rotation Y <span class="val" id="ry-v">0.00</span></label>
  <input type="range" id="ry" min="-3.14159" max="3.14159" step="0.01">
  <label>Rotation Z <span class="val" id="rz-v">0.00</span></label>
  <input type="range" id="rz" min="-3.14159" max="3.14159" step="0.01">
  <label>Scale <span class="val" id="sc-v">1.00</span></label>
  <input type="range" id="sc" min="0.1" max="3" step="0.01">
  <div class="actions">
    <button id="reset">Reset</button>
    <button id="copy">Copy</button>
  </div>
  <pre id="values-display"></pre>
</div>

<script>
// =====================================================
// BAKED TRANSFORM (edit after tuning to deploy)
// =====================================================
const DEFAULT_TRANSFORM = {
  posX: 0.00,
  posY: 1.00,
  posZ: 1.50,
  rotX: 0.00,
  rotY: 0.00,
  rotZ: 0.00,
  scale: 1.00,
};
// =====================================================

const TUNE_MODE = new URLSearchParams(location.search).get('tune') === '1';
const TRANSFORM = { ...DEFAULT_TRANSFORM };

// In tune mode, restore last-saved values from localStorage so the user
// can iterate across sessions.
if (TUNE_MODE) {
  try {
    const saved = JSON.parse(localStorage.getItem('chamberTransform') || 'null');
    if (saved) Object.assign(TRANSFORM, saved);
  } catch (e) {}
}

const status = document.getElementById("status");
const vrbtn = document.getElementById("vrbtn");
const canvas = document.getElementById("renderCanvas");
const tunePanel = document.getElementById("tune-panel");
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

let splat = null;

function applyTransform() {
  if (!splat) return;
  splat.position.set(TRANSFORM.posX, TRANSFORM.posY, TRANSFORM.posZ);
  splat.rotation.set(TRANSFORM.rotX, TRANSFORM.rotY, TRANSFORM.rotZ);
  splat.scaling.set(TRANSFORM.scale, TRANSFORM.scale, TRANSFORM.scale);
}

// Build reference geometry for tune mode: floor grid, axes, user stand-in.
// All under one parent so it's easy to toggle/remove later if needed.
function buildTuneScene(scene) {
  const refs = new BABYLON.TransformNode("tune-refs", scene);

  // ----- Floor grid (10x10m, 1m subdivisions) -----
  const ground = BABYLON.MeshBuilder.CreateGround(
    "tune-ground", { width: 10, height: 10, subdivisions: 10 }, scene
  );
  ground.parent = refs;
  const gridMat = new BABYLON.StandardMaterial("tune-grid-mat", scene);
  gridMat.wireframe = true;
  gridMat.emissiveColor = new BABYLON.Color3(0.25, 0.35, 0.5);
  gridMat.disableLighting = true;
  ground.material = gridMat;

  // A second, finer grid (0.1m) just inside a 2x2m central area for precision
  const fine = BABYLON.MeshBuilder.CreateGround(
    "tune-ground-fine", { width: 2, height: 2, subdivisions: 20 }, scene
  );
  fine.parent = refs;
  fine.position.y = 0.001;
  const fineMat = new BABYLON.StandardMaterial("tune-fine-mat", scene);
  fineMat.wireframe = true;
  fineMat.emissiveColor = new BABYLON.Color3(0.15, 0.2, 0.3);
  fineMat.disableLighting = true;
  fine.material = fineMat;

  // ----- World-origin axis gizmo (X red, Y green, Z blue), 1m each -----
  function axisLine(name, dir, color) {
    const line = BABYLON.MeshBuilder.CreateLines(name, {
      points: [BABYLON.Vector3.Zero(), dir.scale(1.0)],
    }, scene);
    line.color = color;
    line.parent = refs;
    return line;
  }
  axisLine("ax-x", new BABYLON.Vector3(1, 0, 0), new BABYLON.Color3(1, 0.3, 0.3));
  axisLine("ax-y", new BABYLON.Vector3(0, 1, 0), new BABYLON.Color3(0.3, 1, 0.3));
  axisLine("ax-z", new BABYLON.Vector3(0, 0, 1), new BABYLON.Color3(0.4, 0.6, 1));

  // ----- User stand-in: 0.4m disc on the floor + cube at eye height (1.6m) -----
  const standDisc = BABYLON.MeshBuilder.CreateDisc(
    "tune-stand", { radius: 0.4, tessellation: 32 }, scene
  );
  standDisc.parent = refs;
  standDisc.rotation.x = Math.PI / 2;
  standDisc.position.y = 0.002;
  const standMat = new BABYLON.StandardMaterial("tune-stand-mat", scene);
  standMat.emissiveColor = new BABYLON.Color3(0.5, 0.4, 0.1);
  standMat.disableLighting = true;
  standMat.alpha = 0.5;
  standDisc.material = standMat;

  // Eye-height marker (small cube at 1.6m)
  const eye = BABYLON.MeshBuilder.CreateBox("tune-eye", { size: 0.08 }, scene);
  eye.parent = refs;
  eye.position.y = 1.6;
  const eyeMat = new BABYLON.StandardMaterial("tune-eye-mat", scene);
  eyeMat.emissiveColor = new BABYLON.Color3(0.8, 0.6, 0.2);
  eyeMat.disableLighting = true;
  eye.material = eyeMat;

  // Vertical "spine" line from floor to eye marker, so the user's standing
  // axis is obvious in VR
  const spine = BABYLON.MeshBuilder.CreateLines("tune-spine", {
    points: [new BABYLON.Vector3(0, 0, 0), new BABYLON.Vector3(0, 1.6, 0)],
  }, scene);
  spine.color = new BABYLON.Color3(0.6, 0.5, 0.2);
  spine.parent = refs;

  return refs;
}

function setupTuneUI() {
  tunePanel.classList.remove("hidden");

  const fields = [
    ['px', 'posX'], ['py', 'posY'], ['pz', 'posZ'],
    ['rx', 'rotX'], ['ry', 'rotY'], ['rz', 'rotZ'],
    ['sc', 'scale'],
  ];

  function renderUI() {
    for (const [id, key] of fields) {
      document.getElementById(id).value = TRANSFORM[key];
      document.getElementById(id + '-v').textContent = TRANSFORM[key].toFixed(2);
    }
    const out = Object.entries(TRANSFORM)
      .map(([k, v]) => `  ${k}: ${v.toFixed(2)},`).join('\n');
    document.getElementById('values-display').textContent = '{\n' + out + '\n}';
  }

  for (const [id, key] of fields) {
    document.getElementById(id).addEventListener('input', (e) => {
      TRANSFORM[key] = parseFloat(e.target.value);
      applyTransform();
      renderUI();
      try { localStorage.setItem('chamberTransform', JSON.stringify(TRANSFORM)); } catch (e) {}
    });
  }

  document.getElementById('reset').addEventListener('click', () => {
    Object.assign(TRANSFORM, DEFAULT_TRANSFORM);
    applyTransform();
    renderUI();
    try { localStorage.setItem('chamberTransform', JSON.stringify(TRANSFORM)); } catch (e) {}
  });

  document.getElementById('copy').addEventListener('click', () => {
    const text = Object.entries(TRANSFORM)
      .map(([k, v]) => `  ${k}: ${v.toFixed(2)},`).join('\n');
    navigator.clipboard.writeText('{\n' + text + '\n}').then(() => {
      status.textContent = "Values copied to clipboard";
    }, () => {
      status.textContent = "(clipboard blocked, copy from panel)";
    });
  });

  renderUI();
}

async function createScene() {
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

  // Desktop orbit camera. In tune mode it lets you orbit around to inspect.
  // In view mode it just frames the splat once for preview.
  const camera = new BABYLON.ArcRotateCamera(
    "cam", -Math.PI / 2, Math.PI / 2, 4,
    new BABYLON.Vector3(0, 1, 0), scene
  );
  camera.attachControl(canvas, true);
  camera.wheelDeltaPercentage = 0.01;
  camera.minZ = 0.01;
  camera.maxZ = 1000;

  status.textContent = "Loading splat...";
  splat = new BABYLON.GaussianSplattingMesh("splat", null, scene);
  await splat.loadFileAsync("scene.ply");

  applyTransform();

  if (TUNE_MODE) {
    buildTuneScene(scene);
    setupTuneUI();
    status.textContent = "TUNE MODE";
  } else {
    status.textContent = "";
    setTimeout(() => { status.style.opacity = 0; }, 1000);
  }

  // Frame the camera on the splat at its current world position
  splat.computeWorldMatrix(true);
  const bbox = splat.getBoundingInfo().boundingBox;
  camera.target = bbox.centerWorld.clone();
  camera.radius = Math.max(2, bbox.extendSizeWorld.length() * 2.5);

  // WebXR
  try {
    const xrHelper = await scene.createDefaultXRExperienceAsync({
      uiOptions: { sessionMode: "immersive-vr", referenceSpaceType: "local-floor" },
      disableDefaultUI: true,
    });

    if (xrHelper.baseExperience) {
      vrbtn.disabled = false;
      vrbtn.addEventListener("click", async () => {
        try {
          await xrHelper.baseExperience.enterXRAsync("immersive-vr", "local-floor");
        } catch (e) {
          status.style.opacity = 1;
          status.textContent = "VR error: " + e.message;
        }
      });

      xrHelper.baseExperience.onStateChangedObservable.add((state) => {
        if (state === BABYLON.WebXRState.IN_XR) {
          // Splat already at TRANSFORM — no repositioning so the user always
          // sees their loved one in the exact same place.
        }
      });
    } else {
      vrbtn.textContent = "VR not supported";
    }
  } catch (e) {
    vrbtn.textContent = "WebXR unavailable";
    console.error("XR init error:", e);
  }

  return scene;
}

createScene().then((scene) => {
  engine.runRenderLoop(() => scene.render());
}).catch((e) => {
  status.style.opacity = 1;
  status.textContent = "Error: " + e.message;
  console.error(e);
});

window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
